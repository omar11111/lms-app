models:
  Module:
    title: string
    description: text nullable

  Category:
    title: string
    slug: string unique
    description: text nullable

  Course:
    title: string
    description: text
    image: string nullable
    video: string nullable
    price: decimal:8,2 default:0
    total_hours: decimal:8,2
    status: enum:draft,published,archived,pending_review,Featured,Scheduled default:draft
    module_id: id foreign:modules
    instructor_id: id foreign:users nullable
    category_id: id foreign:categories nullable

  Lesson:
    title: string
    description: text nullable
    video: string nullable
    course_id: id foreign:courses

  Enrollment:
    user_id: id foreign:users
    course_id: id foreign:courses
    indexes:
      - unique: user_id, course_id

  Progress:
    user_id: id foreign:users
    lesson_id: id foreign:lessons
    is_completed: boolean default:false
    score: unsignedInteger default:0
    indexes:
      - unique: user_id, lesson_id

relationships:
  Module:
    hasMany: Course

  Category:
    hasMany: Course

  Course:
    belongsTo: Module, Category
    belongsTo (as instructor): User via:instructor_id
    hasMany: Lesson, Enrollment
    belongsToMany: User through:enrollments

  User:
    hasMany (as taughtCourses): Course via:instructor_id

  Lesson:
    belongsTo: Course
    hasMany: Progress

  Enrollment:
    belongsTo: User, Course

  Progress:
    belongsTo: User, Lesson
